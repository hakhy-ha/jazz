version: '3.9'
services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: jazz
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - '6379:6379'

  minio:
    image: minio/minio:latest
    command: server /data
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    ports:
      - '9000:9000'

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - '5000:5000'
    env_file:
      - apps/api/.env.example
    depends_on:
      - postgres
      - redis
      - minio

  socket:
    build:
      context: .
      dockerfile: apps/socket/Dockerfile
    ports:
      - '5001:5001'
    env_file:
      - apps/socket/.env.example
    depends_on:
      - redis
      - api

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - '3000:3000'
    environment:
      - NEXT_PUBLIC_API_URL=http://api:5000
      - NEXT_PUBLIC_SOCKET_URL=http://socket:5001
    depends_on:
      - api
      - socket

volumes:
  postgres_data:
  minio_data:
